<html>
    <style>
        body {
      font-family: Arial;
    }
    h1 {
      text-align: center;
      font-size: 34px;
      color: #1a504c;
    }
    h2 {
      text-align: center;
      font-size: 28px;
      color: #000000;
    }
    h3 {
      font-size: 20px;
      text-align: center;
    }
    form {
      border-style: solid;
      border-radius: 5px;
      border-color: white;
      background-color: white;
      margin-top: 100px;
      border-width: thick;
      text-align: left;
      margin-left: 350px;
      width: 400px;
      height: 525px;
    }
    body {
      background-color: rgba(204, 203, 203, 0.903);
    }
    label {
      font-size: 20px;
      text-align: left;
    }
    #email{
    width: 300px;
    height: 30px;
    margin-left: 45px;
    }
    #submit {
      background-color: #228a87;
      color: white;
      border-radius: 5px;
      border: none;
      margin-top: 25px;
      width: 150px;
      height: 40px;
      margin-left: 125px;
      cursor: pointer;
    }
    #text{font-size:20px;
    text-align:center;
    margin-left:45px;
    width:300px;}
  </style>
  <body>
    <div>
        <form class="form">
          <h1>The Pharmacy Library</h1>
          <h2>Send us your Feedback</h2>
          <br />
          <br />
    <label for="email" id="email">Email</label><br />
    <input type="email" id="email" /><br />
    <br />
    <label for="text" id="text">Comments</label><br/>
    <textarea id="text" rows="5" columns="20"></textarea>
    <input type="submit" id="submit" value="Submit" /><br />
          <br />
          
        </form>
      </div>

</body>
</html>
